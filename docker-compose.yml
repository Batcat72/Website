version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: attendance-db
    environment:
      POSTGRES_DB: attendance_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    command: redis-server --requirepass redispassword123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Face AI Service
  face-ai-service:
    build: ./face-ai-service
    container_name: face-ai-service
    environment:
      - PORT=8000
      - REDIS_URL=redis://:redispassword123@redis:6379
      - MODEL_PATH=/app/models
    volumes:
      - ./face-ai-service:/app
      - face_ai_models:/app/models
    ports:
      - "8000:8000"
    networks:
      - attendance-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend-api:
    build: ./backend-api
    container_name: backend-api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=attendance_system
      - DB_USER=postgres
      - DB_PASSWORD=securepassword123
      - REDIS_URL=redis://:redispassword123@redis:6379
      - JWT_ACCESS_SECRET=your-super-secret-jwt-access-key-change-in-production
      - JWT_REFRESH_SECRET=your-super-secret-jwt-refresh-key-change-in-production
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - FACE_AI_SERVICE_URL=http://face-ai-service:8000
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend-api:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    networks:
      - attendance-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      face-ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React Application
  frontend:
    build: ./frontend
    container_name: attendance-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - REACT_APP_FACE_AI_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - attendance-network
    depends_on:
      - backend-api
    stdin_open: true
    tty: true

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: attendance-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - attendance-network
    depends_on:
      - frontend
      - backend-api

networks:
  attendance-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  face_ai_models: